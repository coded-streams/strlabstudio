# ══════════════════════════════════════════════════════════════════════════════
# nginx/studio.conf — Str:::lab Studio v1.2.6
# Template: processed by docker-entrypoint.sh at container startup.
# envsubst replaces ONLY: ${RESOLVER} ${FLINK_GATEWAY_HOST} ${FLINK_GATEWAY_PORT}
#                         ${JOBMANAGER_HOST} ${JOBMANAGER_PORT}
# All nginx runtime variables ($uri, $host, $remote_addr, etc.) are left as-is.
#
# DO NOT use "set $var" for proxy_pass — nginx 1.25 treats location-block
# variables as lazy runtime vars, logs "uninitialized variable" on the first
# request, and returns HTTP 500. Direct substitution avoids this entirely.
# The resolver directive handles late DNS resolution without needing a variable.
# ══════════════════════════════════════════════════════════════════════════════

client_max_body_size 512m;

server {
    listen      80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # ── DNS resolver
    # Allows nginx to re-resolve the gateway hostname at request time even when
    # the gateway container starts after Studio. Value substituted at startup:
    #   Docker Compose / docker run → 127.0.0.11
    #   Kubernetes                  → cluster DNS IP from pod resolv.conf
    resolver ${RESOLVER} valid=10s ipv6=off;

    # ── Static IDE files
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Health check
    location /healthz {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # ── UDF JAR storage (nginx WebDAV PUT)
    # Browser PUT /udf-jars/x.jar → nginx saves to /var/www/udf-jars/x.jar
    # Uses root (not alias) — required for dav_methods on nginx:alpine.
    # Directory is created and chown'd to the nginx user in docker-entrypoint.sh.
    location /udf-jars/ {
        root /var/www;

        dav_methods          PUT DELETE;
        dav_access           user:rw group:rw all:r;
        create_full_put_path on;

        autoindex           on;
        autoindex_format    json;
        autoindex_localtime off;

        client_max_body_size 512m;

        add_header Access-Control-Allow-Origin  * always;
        add_header Access-Control-Allow-Methods "GET, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  * always;
            add_header Access-Control-Allow-Methods "GET, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
            add_header Content-Length 0;
            return 204;
        }
    }

    # ── Flink SQL Gateway proxy
    # ${FLINK_GATEWAY_HOST} and ${FLINK_GATEWAY_PORT} are substituted by envsubst
    # at container startup, producing a literal value e.g. flink-sql-gateway:8083
    # The resolver above handles runtime DNS so the gateway can start after Studio.
    location /flink-api/ {
        rewrite ^/flink-api/(.*) /$1 break;

        proxy_pass         http://${FLINK_GATEWAY_HOST}:${FLINK_GATEWAY_PORT};

        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        '';

        proxy_read_timeout    300s;
        proxy_send_timeout    300s;
        proxy_connect_timeout  10s;

        proxy_buffering         off;
        proxy_request_buffering off;
        proxy_cache             off;

        add_header Access-Control-Allow-Origin  * always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  * always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
            add_header Content-Length 0;
            return 204;
        }
    }

    # ── Flink JobManager REST proxy ───────────────────────────────────────────
    # Same pattern — direct substitution, no set $var.
    location /jobmanager-api/ {
        rewrite ^/jobmanager-api/(.*) /$1 break;

        proxy_pass         http://${JOBMANAGER_HOST}:${JOBMANAGER_PORT};

        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Connection        '';

        proxy_read_timeout    300s;
        proxy_send_timeout    300s;
        proxy_connect_timeout  10s;

        proxy_buffering         off;
        proxy_request_buffering off;

        client_max_body_size 512m;
    }
}