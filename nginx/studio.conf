# ─────────────────────────────────────────────────────────────────────────────
# nginx/studio.conf  —  OSS Docker image template
# This file uses ${VAR} placeholders substituted at container start by
# docker-entrypoint.sh via envsubst.
#
# NOTE: This file is for the PUBLIC codedstreams/flinksql-studio Docker image.
#       For the LOCAL flink-cluster setup, use nginx/studio.conf from
#       the flink-cluster package instead (hardcoded hostnames).
# ─────────────────────────────────────────────────────────────────────────────

upstream flink_gateway {
    server ${FLINK_GATEWAY_HOST}:${FLINK_GATEWAY_PORT};
    keepalive 32;
}

upstream flink_jobmanager {
    server ${JOBMANAGER_HOST}:${JOBMANAGER_PORT};
    keepalive 16;
}

server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header Referrer-Policy        "strict-origin" always;

    gzip on;
    gzip_types text/html text/css application/javascript application/json;
    gzip_min_length 1024;

    # ── Static IDE ───────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ── /flink-api/ → SQL Gateway ────────────────────────────────
    location /flink-api/ {
        add_header Access-Control-Allow-Origin  "*"                                      always;
        add_header Access-Control-Allow-Methods "GET, POST, DELETE, OPTIONS, PUT, PATCH" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, Accept"    always;

        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin "*";
            add_header Access-Control-Max-Age 3600;
            return 204;
        }

        rewrite ^/flink-api/(.*)$ /$1 break;
        proxy_pass          http://flink_gateway;
        proxy_http_version  1.1;
        proxy_set_header    Connection "";
        proxy_set_header    Host "${FLINK_GATEWAY_HOST}:${FLINK_GATEWAY_PORT}";
        proxy_set_header    X-Real-IP $remote_addr;
        proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering     off;
        proxy_read_timeout  600s;
        proxy_send_timeout  600s;
        proxy_connect_timeout 15s;

        proxy_intercept_errors on;
        error_page 502 503 504 @upstream_error;
    }

    # ── /jobmanager-api/ → JobManager REST ──────────────────────
    location /jobmanager-api/ {
        add_header Access-Control-Allow-Origin "*" always;

        rewrite ^/jobmanager-api/(.*)$ /$1 break;
        proxy_pass          http://flink_jobmanager;
        proxy_http_version  1.1;
        proxy_set_header    Connection "";
        proxy_set_header    Host "${JOBMANAGER_HOST}:${JOBMANAGER_PORT}";
        proxy_set_header    X-Real-IP $remote_addr;
        proxy_buffering     off;
        proxy_read_timeout  30s;
        proxy_send_timeout  30s;

        proxy_intercept_errors on;
        error_page 502 503 504 @upstream_error;
    }

    # ── Upstream error fallback ──────────────────────────────────
    location @upstream_error {
        add_header Access-Control-Allow-Origin "*" always;
        add_header Content-Type "application/json" always;
        return 502 '{"errors":["Upstream unavailable — check FLINK_GATEWAY_HOST / JOBMANAGER_HOST"]}';
    }

    # ── Health probe ─────────────────────────────────────────────
    location /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
