# ══════════════════════════════════════════════════════════════════════════════
# nginx/studio.conf — Str:::lab Studio v1.2.5
# Template: processed by docker-entrypoint.sh at container startup.
# envsubst replaces: ${RESOLVER} ${FLINK_GATEWAY_HOST} ${FLINK_GATEWAY_PORT}
#                    ${JOBMANAGER_HOST} ${JOBMANAGER_PORT}
# All nginx runtime variables ($uri, $host, $remote_addr, etc.) are left as-is.
# ══════════════════════════════════════════════════════════════════════════════

client_max_body_size 512m;

server {
    listen      80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # ── DNS resolver ──────────────────────────────────────────────────────────
    # Required for variable upstreams. Value is read from /etc/resolv.conf by
    # docker-entrypoint.sh and substituted here at startup:
    #   Docker Compose / docker run → 127.0.0.11
    #   Kubernetes                  → cluster DNS IP
    resolver ${RESOLVER} valid=10s ipv6=off;

    # ── Static IDE files ──────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Health check ──────────────────────────────────────────────────────────
    location /healthz {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # ── UDF JAR storage (nginx WebDAV PUT) ────────────────────────────────────
    # Browser PUT /udf-jars/x.jar → nginx saves to /var/www/udf-jars/x.jar
    # Uses root (not alias) — required for dav_methods on nginx:alpine.
    # Directory is created and chown'd to the nginx user in docker-entrypoint.sh.
    location /udf-jars/ {
        root /var/www;

        dav_methods          PUT DELETE;
        dav_access           user:rw group:rw all:r;
        create_full_put_path on;

        autoindex           on;
        autoindex_format    json;
        autoindex_localtime off;

        client_max_body_size 512m;

        add_header Access-Control-Allow-Origin  * always;
        add_header Access-Control-Allow-Methods "GET, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  * always;
            add_header Access-Control-Allow-Methods "GET, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
            add_header Content-Length 0;
            return 204;
        }
    }

    # ── Flink SQL Gateway proxy ───────────────────────────────────────────────
    # Uses a variable upstream so nginx resolves the hostname at request time
    # (not at startup). This is required when the gateway container starts after
    # Studio, or when using docker run without depends_on ordering.
    # The resolver directive above enables runtime DNS lookups.
    location /flink-api/ {
        rewrite ^/flink-api/(.*) /$1 break;

        set $flink_gw ${FLINK_GATEWAY_HOST}:${FLINK_GATEWAY_PORT};
        proxy_pass http://$flink_gw;

        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        '';

        proxy_read_timeout    300s;
        proxy_send_timeout    300s;
        proxy_connect_timeout  10s;

        proxy_buffering         off;
        proxy_request_buffering off;
        proxy_cache             off;

        add_header Access-Control-Allow-Origin  * always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  * always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
            add_header Content-Length 0;
            return 204;
        }
    }

    # ── Flink JobManager REST proxy ───────────────────────────────────────────
    location /jobmanager-api/ {
        rewrite ^/jobmanager-api/(.*) /$1 break;

        set $flink_jm ${JOBMANAGER_HOST}:${JOBMANAGER_PORT};
        proxy_pass http://$flink_jm;

        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Connection        '';

        proxy_read_timeout    300s;
        proxy_send_timeout    300s;
        proxy_connect_timeout  10s;

        proxy_buffering         off;
        proxy_request_buffering off;

        client_max_body_size 512m;
    }
}