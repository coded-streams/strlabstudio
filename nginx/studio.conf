# ─────────────────────────────────────────────────────────────────────────────
# nginx/studio.conf — FlinkSQL Studio reverse proxy configuration
#
# ${VAR} placeholders are substituted at container startup by envsubst.
# Set values via environment variables in your docker run command or
# docker-compose.yml:
#
#   FLINK_GATEWAY_HOST / FLINK_GATEWAY_PORT  — Flink SQL Gateway
#   JOBMANAGER_HOST    / JOBMANAGER_PORT     — Flink JobManager REST API
#
# Why no upstream{} blocks?
#   nginx resolves upstream hostnames at startup. If the target service
#   is not yet reachable, nginx crashes with "host not found in upstream".
#   Using resolver + per-request variables defers DNS resolution to
#   request time, so the container starts cleanly regardless of whether
#   the upstream services are up or on the same network yet.
#   Docker's internal DNS is always available at 127.0.0.11.
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header Referrer-Policy        "strict-origin" always;

    gzip on;
    gzip_types text/html text/css application/javascript application/json;
    gzip_min_length 1024;

    # ── Static IDE ───────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ── /flink-api/ → SQL Gateway ────────────────────────────────
    location /flink-api/ {
        add_header Access-Control-Allow-Origin  "*"                                      always;
        add_header Access-Control-Allow-Methods "GET, POST, DELETE, OPTIONS, PUT, PATCH" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, Accept"    always;

        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin "*";
            add_header Access-Control-Max-Age 3600;
            return 204;
        }

        resolver              127.0.0.11 valid=5s ipv6=off;
        set $flink_gw         http://${FLINK_GATEWAY_HOST}:${FLINK_GATEWAY_PORT};
        rewrite ^/flink-api/(.*)$ /$1 break;
        proxy_pass            $flink_gw;
        proxy_http_version    1.1;
        proxy_set_header      Connection "";
        proxy_set_header      Host $http_host;
        proxy_set_header      X-Real-IP $remote_addr;
        proxy_set_header      X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering       off;
        proxy_read_timeout    600s;
        proxy_send_timeout    600s;
        proxy_connect_timeout 15s;

        proxy_intercept_errors on;
        error_page 502 503 504 @upstream_error;
    }

    # ── /jobmanager-api/ → JobManager REST ──────────────────────
    location /jobmanager-api/ {
        add_header Access-Control-Allow-Origin "*" always;

        resolver            127.0.0.11 valid=5s ipv6=off;
        set $flink_jm       http://${JOBMANAGER_HOST}:${JOBMANAGER_PORT};
        rewrite ^/jobmanager-api/(.*)$ /$1 break;
        proxy_pass          $flink_jm;
        proxy_http_version  1.1;
        proxy_set_header    Connection "";
        proxy_set_header    Host $http_host;
        proxy_set_header    X-Real-IP $remote_addr;
        proxy_buffering     off;
        proxy_read_timeout  30s;
        proxy_send_timeout  30s;

        proxy_intercept_errors on;
        error_page 502 503 504 @upstream_error;
    }

    # ── Upstream error fallback ──────────────────────────────────
    location @upstream_error {
        add_header Access-Control-Allow-Origin "*" always;
        add_header Content-Type "application/json" always;
        return 502 '{"errors":["Upstream unavailable — check FLINK_GATEWAY_HOST / JOBMANAGER_HOST"]}';
    }

    # ── Health probe ─────────────────────────────────────────────
    location /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}