# nginx/flink-cors.conf
# ─────────────────────────────────────────────────────────────────────────────
# CORS proxy for Flink SQL Gateway + UDF JAR file server
# Port 8084 — used by Str:::Lab Studio
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 8084;
    server_name _;

    # ── Allow large JAR uploads ───────────────────────────────────────────────
    client_max_body_size 512m;

    # ── CORS helper macro ─────────────────────────────────────────────────────
    # Applied to all locations that need browser access
    set $cors_origin $http_origin;

    # ══════════════════════════════════════════════════════════════════════════
    #  /udf-jars/ — JAR file store
    #
    #  Browser (Studio):  PUT  http://localhost:8084/udf-jars/my.jar
    #  SQL Gateway:       ADD JAR 'http://flink-gateway-cors-proxy:8084/udf-jars/my.jar'
    #
    #  The Gateway container resolves flink-gateway-cors-proxy by Docker DNS
    #  on kafka-network-02 — no shared volume needed.
    # ══════════════════════════════════════════════════════════════════════════
    location /udf-jars/ {
        alias /var/www/udf-jars/;

        # Allow directory listing so the Studio can show uploaded JARs
        autoindex on;
        autoindex_format json;

        # WebDAV — enables PUT (upload) and DELETE (cleanup)
        dav_methods     PUT DELETE;
        dav_access      user:rw group:r all:r;
        create_full_put_path on;

        # CORS — allow the browser (any origin) to PUT and GET
        add_header Access-Control-Allow-Origin  * always;
        add_header Access-Control-Allow-Methods "GET, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  * always;
            add_header Access-Control-Allow-Methods "GET, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
            return 204;
        }
    }

    # ══════════════════════════════════════════════════════════════════════════
    #  /flink-api/ — proxy to SQL Gateway (existing)
    # ══════════════════════════════════════════════════════════════════════════
    location /flink-api/ {
        proxy_pass         http://flink-sql-gateway:8083/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        add_header Access-Control-Allow-Origin  * always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  * always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
            return 204;
        }
    }

    # ══════════════════════════════════════════════════════════════════════════
    #  /jobmanager-api/ — proxy to Flink JobManager REST API (existing)
    # ══════════════════════════════════════════════════════════════════════════
    location /jobmanager-api/ {
        proxy_pass         http://codedstream-jobmanager:8081/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        client_max_body_size 512m;

        add_header Access-Control-Allow-Origin  * always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  * always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
            return 204;
        }
    }
}