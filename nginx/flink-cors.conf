# =============================================================
# nginx/flink-cors.conf  (FIXED — v2.0)
# - Proxies browser requests to Flink SQL Gateway (port 8083)
# - Adds /udf-jars/ location with WebDAV PUT + autoindex
#   so the browser can upload JARs and the SQL Gateway can
#   fetch them via http://flink-gateway-cors-proxy:8084/udf-jars/
# =============================================================

upstream flink_gateway {
    server flink-sql-gateway:8083;
    keepalive 32;
}

server {
    listen 8084;
    server_name _;

    # ── Allow large JAR uploads ───────────────────────────────
    client_max_body_size 512m;

    # ── Global CORS headers on every response ─────────────────
    add_header 'Access-Control-Allow-Origin'      '*'                                                       always;
    add_header 'Access-Control-Allow-Methods'     'GET, POST, PUT, DELETE, OPTIONS, PATCH'                 always;
    add_header 'Access-Control-Allow-Headers'     'Content-Type, Accept, Authorization, X-Requested-With' always;
    add_header 'Access-Control-Expose-Headers'    'Content-Type, Content-Length, X-Total-Count'            always;
    add_header 'Access-Control-Max-Age'           '86400'                                                  always;

    # ── OPTIONS preflight ─────────────────────────────────────
    if ($request_method = OPTIONS) {
        return 204;
    }

    # ══════════════════════════════════════════════════════════
    # /udf-jars/ — JAR storage for UDF Manager
    # Browser PUTs here; SQL Gateway fetches from here via HTTP
    # ══════════════════════════════════════════════════════════
    location /udf-jars/ {
        # Where JARs are stored inside the nginx container
        alias /var/www/udf-jars/;

        # Allow directory listing so the UDF Manager can read the JAR list
        autoindex             on;
        autoindex_format      json;
        autoindex_exact_size  on;
        autoindex_localtime   on;

        # WebDAV: allow browser to PUT (upload) and DELETE JARs
        dav_methods           PUT DELETE;
        dav_access            user:rw group:r all:r;

        # Ensure the directory exists (nginx won't create it)
        # Run: docker exec flink-gateway-cors-proxy mkdir -p /var/www/udf-jars
        # or add it to your docker-compose entrypoint (see below)

        # CORS for this location (needed for cross-origin PUT from browser)
        add_header 'Access-Control-Allow-Origin'  '*'                                   always;
        add_header 'Access-Control-Allow-Methods' 'GET, PUT, DELETE, OPTIONS, HEAD'     always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization'         always;

        # Increase timeouts for large uploads
        proxy_connect_timeout  0;
        send_timeout           300s;
    }

    # ── Flink SQL Gateway proxy ───────────────────────────────
    location / {
        proxy_pass         http://flink_gateway;
        proxy_http_version 1.1;

        proxy_set_header   Connection        '';
        proxy_set_header   Host              'flink-sql-gateway:8083';
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_buffering             off;
        proxy_request_buffering     off;
        proxy_cache                 off;

        proxy_connect_timeout   15s;
        proxy_send_timeout      300s;
        proxy_read_timeout      300s;

        client_max_body_size    512m;

        proxy_hide_header 'Access-Control-Allow-Origin';
        proxy_hide_header 'Access-Control-Allow-Methods';
        proxy_hide_header 'Access-Control-Allow-Headers';
    }

    # ── Health check ──────────────────────────────────────────
    location = /nginx-health {
        access_log  off;
        add_header  Content-Type 'application/json' always;
        return 200  '{"status":"nginx-ok","proxy":"flink-gateway-cors","upstream":"flink-sql-gateway:8083","udf-jars":"enabled"}';
    }

    # ── Custom error pages with CORS ──────────────────────────
    error_page 502 = @upstream_error;
    error_page 503 = @upstream_error;
    error_page 504 = @upstream_error;

    location @upstream_error {
        internal;
        add_header 'Access-Control-Allow-Origin'  '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS, PATCH' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Accept, Authorization' always;
        add_header 'Content-Type'                 'application/json' always;
        return 502 '{"error":"Flink SQL Gateway unreachable","message":"The flink-sql-gateway container is not responding. Check: docker compose ps","status":502}';
    }
}