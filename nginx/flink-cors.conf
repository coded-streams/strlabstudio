# ══════════════════════════════════════════════════════════════════════════════
#
# WHO NEEDS THIS:
#   Only needed if you want browsers to reach the SQL Gateway DIRECTLY
#   (i.e. "Direct Gateway" connection mode from outside the Docker network).
#
# WHO DOES NOT NEED THIS:
#   If you use "Via Studio" connection mode, the Studio nginx already proxies
#   all requests and adds CORS headers. This file is not involved at all.
#
# HOW TO USE:
#   Add the flink-gateway-cors-proxy service to your docker-compose.yml
#   (already included as an optional service in the provided compose file).
#   Then in the IDE, use Direct Gateway mode with URL: http://localhost:8084
#
# ══════════════════════════════════════════════════════════════════════════════

upstream flink_gateway {
    server flink-sql-gateway:8083;
    keepalive 32;
}

server {
    listen 8084;
    server_name _;

    # ── CORS headers on every response including errors
    add_header 'Access-Control-Allow-Origin'   '*'                                                       always;
    add_header 'Access-Control-Allow-Methods'  'GET, POST, PUT, DELETE, OPTIONS, PATCH'                 always;
    add_header 'Access-Control-Allow-Headers'  'Content-Type, Accept, Authorization, X-Requested-With' always;
    add_header 'Access-Control-Expose-Headers' 'Content-Type, Content-Length, X-Total-Count'            always;
    add_header 'Access-Control-Max-Age'        '86400'                                                  always;

    # ── Handle OPTIONS preflight before proxying
    if ($request_method = OPTIONS) {
        return 204;
    }

    # ── Proxy all requests to the SQL Gateway
    location / {
        proxy_pass         http://flink_gateway;
        proxy_http_version 1.1;

        proxy_set_header   Connection        '';
        proxy_set_header   Host              'flink-sql-gateway:8083';
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;

        proxy_buffering         off;
        proxy_request_buffering off;
        proxy_cache             off;

        proxy_connect_timeout  15s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;

        client_max_body_size 512m;

        # Strip any CORS headers from upstream to prevent duplicates
        proxy_hide_header 'Access-Control-Allow-Origin';
        proxy_hide_header 'Access-Control-Allow-Methods';
        proxy_hide_header 'Access-Control-Allow-Headers';
    }

    # ── Health check
    location = /nginx-health {
        access_log off;
        add_header Content-Type 'application/json' always;
        return 200 '{"status":"ok","upstream":"flink-sql-gateway:8083"}';
    }

    # ── Friendly error when gateway is unreachable
    error_page 502 503 504 = @upstream_error;
    location @upstream_error {
        internal;
        add_header 'Access-Control-Allow-Origin'  '*'                                        always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS, PATCH'  always;
        add_header 'Content-Type'                 'application/json'                         always;
        return 502 '{"error":"Flink SQL Gateway unreachable","hint":"Check: docker compose ps flink-sql-gateway","status":502}';
    }
}