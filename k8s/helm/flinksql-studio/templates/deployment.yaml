apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "flinksql-studio.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ include "flinksql-studio.fullname" . }}
    chart: {{ .Chart.Name }}-{{ .Chart.Version }}
    release: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "flinksql-studio.fullname" . }}
  template:
    metadata:
      labels:
        app: {{ include "flinksql-studio.fullname" . }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      containers:
        - name: studio
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 80
              name: http
          env:
            - name: FLINK_GATEWAY_HOST
              value: "{{ .Values.gateway.host }}"
            - name: FLINK_GATEWAY_PORT
              value: "{{ .Values.gateway.port }}"
            - name: JOBMANAGER_HOST
              value: "{{ .Values.jobmanager.host }}"
            - name: JOBMANAGER_PORT
              value: "{{ .Values.jobmanager.port }}"
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "flinksql-studio.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ include "flinksql-studio.fullname" . }}
spec:
  selector:
    app: {{ include "flinksql-studio.fullname" . }}
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 80
      name: http
      {{- if and (eq .Values.service.type "NodePort") .Values.service.nodePort }}
      nodePort: {{ .Values.service.nodePort }}
      {{- end }}
{{- if .Values.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "flinksql-studio.fullname" . }}
  namespace: {{ .Release.Namespace }}
  annotations:
    kubernetes.io/ingress.class: {{ .Values.ingress.className }}
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- if .Values.ingress.tls }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ .Values.ingress.tlsSecretName }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "flinksql-studio.fullname" . }}
                port:
                  number: {{ .Values.service.port }}
{{- end }}
