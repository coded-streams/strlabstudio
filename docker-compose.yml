# ══════════════════════════════════════════════════════════════════════════════
# Str:::lab Studio — docker-compose.yml
#
# Pulls and runs the Studio image only.
# Your Flink cluster (gateway, jobmanager, taskmanagers) must already be
# running on the network specified below.
#
# Usage:
#   1. Set the env vars below to match your cluster container names
#   2. Set the network name to match your Flink Docker network
#   3. docker compose up -d
#   4. Open http://localhost:3030  →  select "Via Studio"
# ══════════════════════════════════════════════════════════════════════════════

services:

  flink-studio:
    image: codedstreams/strlabstudio:latest
    container_name: flink-studio
    restart: unless-stopped
    ports:
      - "3030:80"
    environment:
      FLINK_GATEWAY_HOST: flink-sql-gateway      # your SQL Gateway container name
      FLINK_GATEWAY_PORT: "8083"                 # SQL Gateway port
      JOBMANAGER_HOST:    flink-jobmanager        # your JobManager container name
      JOBMANAGER_PORT:    "8081"                  # JobManager REST port
    volumes:
      - udf-jars:/var/www/udf-jars               # shared with gateway for ADD JAR
    networks:
      - flink-network                            # your existing Flink Docker network

# ── Shared volume for UDF JAR upload ─────────────────────────────────────────
# Studio saves uploaded JARs here. For ADD JAR to work, also mount this volume
# on your SQL Gateway container at /var/www/udf-jars.
volumes:
  udf-jars:

# ── Join your existing Flink network ─────────────────────────────────────────
# Replace flink-network with your actual network name.
# Run: docker network ls   to find it.
networks:
  flink-network:
    external: true