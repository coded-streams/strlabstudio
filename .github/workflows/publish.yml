# ─────────────────────────────────────────────────────────────────────────────
# .github/workflows/publish.yml
# Builds multi-arch Docker image and pushes to Docker Hub on every tag push.
#
# Required GitHub secrets:
#   DOCKERHUB_USERNAME  = codedstreams
#   DOCKERHUB_TOKEN     = dckr_pat_xxxx...  (see docs/DOCKER_TOKEN.md)
# ─────────────────────────────────────────────────────────────────────────────
name: Build & Publish Docker Image

on:
  push:
    tags:
      - "v*.*.*"          # triggers on v1.0.0, v1.2.3, etc.
  workflow_dispatch:      # manual trigger from GitHub UI

env:
  IMAGE_NAME: codedstreams/flinksql-studio

jobs:
  build-and-push:
    name: Build & push multi-arch image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up QEMU (for ARM64 builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.IMAGE_NAME }}
          readme-filepath: ./README.md
