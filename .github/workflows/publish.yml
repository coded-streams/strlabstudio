# ─────────────────────────────────────────────────────────────────────────────
# .github/workflows/publish.yml
# Two jobs:
#   1. build-and-push  — builds multi-arch Docker image, pushes to Docker Hub
#   2. deploy-docs     — deploys docs/index.html to GitHub Pages
#
# Required GitHub secrets:
#   DOCKERHUB_USERNAME  = codedstreams
#   DOCKERHUB_TOKEN     = dckr_pat_xxxx...
#
# Required GitHub Pages config (one-time, do this in repo Settings):
#   Settings → Pages → Source → GitHub Actions
# ─────────────────────────────────────────────────────────────────────────────
name: Build, Publish & Deploy Docs

on:
  push:
    tags:
      - "v*.*.*"        # triggers on v1.0.0, v1.2.3, etc.
  workflow_dispatch:    # manual trigger from GitHub UI

env:
  IMAGE_NAME: codedstreams/flinksql-studio

jobs:

  # ── JOB 1: Build Docker image and push to Docker Hub ──────────────────────
  build-and-push:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up QEMU (for ARM64 cross-compilation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}
            type=sha,prefix=sha-,format=short

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.IMAGE_NAME }}
          readme-filepath: ./README.md

  # ── JOB 2: Deploy docs to GitHub Pages ────────────────────────────────────
  deploy-docs:
    name: Deploy docs to GitHub Pages
    runs-on: ubuntu-latest
    needs: build-and-push     # only deploy docs if Docker build succeeded
    permissions:
      contents: read
      pages: write            # required to deploy to GitHub Pages
      id-token: write         # required for OIDC token (Pages deployment)

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Prepare docs site
        run: |
          mkdir -p _site
          # Copy the full docs folder as the Pages root
          cp -r docs/. _site/
          # Also copy the IDE itself so docs links to ../studio/index.html work
          mkdir -p _site/studio
          cp studio/index.html _site/studio/index.html
          # Copy logo assets if present
          cp -r docs/architecture.svg _site/ 2>/dev/null || true
          echo "Site contents:"
          find _site -type f | sort

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

      - name: Print deployed URL
        run: echo "Docs live at ${{ steps.deploy.outputs.page_url }}"